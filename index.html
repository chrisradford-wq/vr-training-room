<!DOCTYPE html>
<html>
 
<head>
  <meta charset="utf-8">
  <title>VR Training Room</title>
 
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
  <script src="https://unpkg.com/aframe-event-set-component@5.0.0/dist/aframe-event-set-component.min.js"></script>
 
  <script>
  // =====================================================
  // HAND GRAB COMPONENT
  // Pinch (index + thumb) to grab nearest .grabbable.
  // Move and rotate hand to inspect the model.
  // =====================================================
 
  AFRAME.registerComponent('hand-grab', {
 
    schema: {
      grabDistance: { type: 'number', default: 0.15 }
    },
 
    init: function () {
      this.grabbing     = false;
      this.grabbedEl    = null;
      this.pinching     = false;
 
      this.ctrlPos      = new THREE.Vector3();
      this.ctrlQuat     = new THREE.Quaternion();
      this.ctrlScale    = new THREE.Vector3();
      this.prevCtrlPos  = new THREE.Vector3();
      this.prevCtrlQuat = new THREE.Quaternion();
      this.deltaPos     = new THREE.Vector3();
      this.deltaQuat    = new THREE.Quaternion();
      this.modelPos     = new THREE.Vector3();
 
      this.el.addEventListener('pinchstarted', this.onPinchStart.bind(this));
      this.el.addEventListener('pinchended',   this.onPinchEnd.bind(this));
    },
 
    onPinchStart: function () {
      this.pinching = true;
 
      this.el.object3D.matrixWorld.decompose(
        this.ctrlPos, this.ctrlQuat, this.ctrlScale
      );
 
      const candidates = document.querySelectorAll('.grabbable');
      let closest     = null;
      let closestDist = this.data.grabDistance;
 
      candidates.forEach(el => {
        if (!el.object3D.visible) return;
        el.object3D.getWorldPosition(this.modelPos);
        const dist = this.ctrlPos.distanceTo(this.modelPos);
        if (dist < closestDist) {
          closestDist = dist;
          closest     = el;
        }
      });
 
      if (!closest) return;
 
      this.grabbedEl = closest;
      this.grabbing  = true;
      this.prevCtrlPos.copy(this.ctrlPos);
      this.prevCtrlQuat.copy(this.ctrlQuat);
 
      this.grabbedEl.setAttribute('material', 'emissive: #334433');
    },
 
    onPinchEnd: function () {
      if (this.grabbedEl) {
        this.grabbedEl.setAttribute('material', 'emissive: #000000');
      }
      this.grabbing  = false;
      this.grabbedEl = null;
      this.pinching  = false;
    },
 
    tick: function () {
      if (!this.grabbing || !this.grabbedEl) return;
 
      this.el.object3D.matrixWorld.decompose(
        this.ctrlPos, this.ctrlQuat, this.ctrlScale
      );
 
      this.deltaPos.subVectors(this.ctrlPos, this.prevCtrlPos);
      this.grabbedEl.object3D.position.add(this.deltaPos);
 
      this.deltaQuat.copy(this.prevCtrlQuat).invert();
      this.deltaQuat.premultiply(this.ctrlQuat);
      this.grabbedEl.object3D.quaternion.premultiply(this.deltaQuat);
 
      this.prevCtrlPos.copy(this.ctrlPos);
      this.prevCtrlQuat.copy(this.ctrlQuat);
    }
 
  });
  </script>
 
</head>
 
<body>
 
<a-scene
  cursor="rayOrigin: mouse"
  webxr="optionalFeatures: hand-tracking"
  renderer="colorManagement: true"
  raycaster="objects: .clickable, .grabbable">
 
  <!-- ========================= -->
  <!-- ENVIRONMENT               -->
  <!-- ========================= -->
 
  <a-sky color="#BBBBBB"></a-sky>
 
  <!-- FLOOR -->
  <a-plane
    position="0 0 0"
    rotation="-90 0 0"
    width="20" height="20"
    color="#999999">
  </a-plane>
 
  <!-- BACK WALL -->
  <a-plane
    position="0 5 -10"
    width="20" height="10"
    color="#999999">
  </a-plane>
 
  <!-- LEFT WALL -->
  <a-plane
    position="-10 5 0"
    rotation="0 90 0"
    width="20" height="10"
    color="#555555">
  </a-plane>
 
  <!-- RIGHT WALL -->
  <a-plane
    position="10 5 0"
    rotation="0 -90 0"
    width="20" height="10"
    color="#555555">
  </a-plane>
 
  <!-- CEILING -->
  <a-plane
    position="0 10 0"
    rotation="90 0 0"
    width="20" height="20"
    color="#111111">
  </a-plane>
 
  <!-- ========================= -->
  <!-- DESK                      -->
  <!-- ========================= -->
 
  <!-- DESK TOP -->
  <a-box position="0 0.75 2"      width="2"    height="0.08" depth="1"    color="#5A4A3A"></a-box>
 
  <!-- LEGS -->
  <a-box position="-0.9 0.35 1.6" width="0.08" height="0.7"  depth="0.08" color="#444444"></a-box>
  <a-box position="0.9 0.35 1.6"  width="0.08" height="0.7"  depth="0.08" color="#444444"></a-box>
  <a-box position="-0.9 0.35 2.4" width="0.08" height="0.7"  depth="0.08" color="#444444"></a-box>
  <a-box position="0.9 0.35 2.4"  width="0.08" height="0.7"  depth="0.08" color="#444444"></a-box>
 
  <!-- ========================= -->
  <!-- LIGHTS                    -->
  <!-- ========================= -->
 
  <a-light type="ambient"     intensity="0.8"></a-light>
  <a-light type="directional" intensity="1" position="2 8 4"></a-light>
 
  <!-- ========================= -->
  <!-- BANNER                    -->
  <!-- ========================= -->
 
  <a-image
    src="assets/Red Landpower VR Training Academy.svg"
    position="0 5 -9.9"
    width="14"
    height="6">
  </a-image>
 
  <!-- ========================= -->
  <!-- DESK MODEL 1 — CARBURETOR -->
  <!-- ========================= -->
 
  <a-entity
    id="model1"
    class="grabbable"
    gltf-model="models/carburetor.glb"
    position=".2 1.1 2.2"
    rotation="0 45 0"
    scale=".25 .25 .25"
    visible="true">
  </a-entity>
 
  <!-- ========================= -->
  <!-- DESK MODEL 2 — CLAAS      -->
  <!-- ========================= -->
 
  <a-entity
    id="model2"
    class="grabbable"
    gltf-model="models/CLAAS.glb"
    animation-mixer
    position=".2 1.1 2.2"
    rotation="0 0 0"
    scale="1 1 1"
    visible="false">
  </a-entity>
 
  <!-- ========================= -->
  <!-- PREV / NEXT BUTTONS       -->
  <!-- ========================= -->
 
  <a-box
    id="prevButton"
    class="clickable"
    position="-0.78 1 2.3"
    width="0.3" height="0.15" depth="0.08"
    color="#4444ff"
    event-set__enter="_event: mouseenter; color: #6666ff"
    event-set__leave="_event: mouseleave; color: #4444ff">
  </a-box>
  <a-text value="PREV" position="-.93 1 2.35" scale="0.5 0.5 0.5" color="white"></a-text>
 
  <a-box
    id="nextButton"
    class="clickable"
    position="-.8 1.2 2.3"
    width="0.3" height="0.15" depth="0.08"
    color="#44aa44"
    event-set__enter="_event: mouseenter; color: #66cc66"
    event-set__leave="_event: mouseleave; color: #44aa44">
  </a-box>
  <a-text value="NEXT" position="-.95 1.2 2.34" scale="0.5 0.5 0.5" color="white"></a-text>
 
  <!-- ========================= -->
  <!-- BACKGROUND — RIGHT CORNER -->
  <!-- CLAAS 630 tractor         -->
  <!-- ========================= -->
 
  <a-entity
    gltf-model="models/claas_630.glb"
    position="6 -0.7 -5"
    rotation="0 25 0"
    scale="0.012 0.012 0.012">
  </a-entity>
 
  <!-- ========================= -->
  <!-- BACKGROUND — LEFT CORNER  -->
  <!-- Engine display model      -->
  <!-- ========================= -->
 
  <a-entity
    gltf-model="models/engine.glb"
    position="-4 0 -6"
    rotation="0 -45 0"
    scale=".5 .5 .5">
  </a-entity>
 
  <!-- ========================= -->
  <!-- CAMERA / VR RIG           -->
  <!-- ========================= -->
 
  <a-entity id="rig" position="0 0 3">
 
    <a-camera position="0 1.2 0">
      <a-cursor rayOrigin="mouse" fuse="false" material="opacity: 0"></a-cursor>
    </a-camera>
 
    <!-- LEFT HAND -->
    <a-entity
      id="leftHand"
      hand-controls="hand: left; handModelStyle: lowPoly; color: #ffccaa"
      hand-grab>
    </a-entity>
 
    <!-- RIGHT HAND -->
    <a-entity
      id="rightHand"
      hand-controls="hand: right; handModelStyle: lowPoly; color: #ffccaa"
      hand-grab>
    </a-entity>
 
  </a-entity>
 
  <!-- ========================= -->
  <!-- MODEL SWITCHING LOGIC     -->
  <!-- ========================= -->
 
  <script>
  window.onload = function () {
 
    let currentModel = 1;
 
    const model1     = document.querySelector('#model1');
    const model2     = document.querySelector('#model2');
    const prevButton = document.querySelector('#prevButton');
    const nextButton = document.querySelector('#nextButton');
 
    function showModel(n) {
      model1.setAttribute('visible', n === 1);
      model2.setAttribute('visible', n === 2);
    }
 
    nextButton.addEventListener('mousedown', function () {
      currentModel = currentModel >= 2 ? 1 : currentModel + 1;
      showModel(currentModel);
    });
 
    prevButton.addEventListener('mousedown', function () {
      currentModel = currentModel <= 1 ? 2 : currentModel - 1;
      showModel(currentModel);
    });
 
  };
  </script>
 
</a-scene>
</body>
</html>
