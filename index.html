<!DOCTYPE html>
<html>
 
<head>
  <meta charset="utf-8">
  <title>VR Training Room</title>
 
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
  <script src="https://unpkg.com/aframe-event-set-component@5.0.0/dist/aframe-event-set-component.min.js"></script>
 
  <script>
  // =====================================================
  // HAND VISUAL COMPONENT
  // Draws a small sphere at each key fingertip so the
  // user can see where their hands are in the scene.
  // Uses raw WebXR joint data — no hand-controls needed.
  // =====================================================
 
  AFRAME.registerComponent('hand-visual', {
 
    schema: {
      hand: { type: 'string', default: 'right' }
    },
 
    init: function () {
 
      // Create small spheres for thumb, index, and wrist
      const joints = ['thumb-tip', 'index-finger-tip', 'wrist',
                      'middle-finger-tip', 'ring-finger-tip', 'pinky-finger-tip'];
 
      this.jointEls = {};
 
      joints.forEach(name => {
        const dot = document.createElement('a-sphere');
        dot.setAttribute('radius', name === 'wrist' ? 0.02 : 0.012);
        dot.setAttribute('color',  name === 'thumb-tip' || name === 'index-finger-tip'
          ? '#ffdd00' : '#ffccaa');
        dot.setAttribute('material', 'shader: flat'); // no lighting on hand dots
        this.el.sceneEl.appendChild(dot);
        this.jointEls[name] = dot;
      });
 
      this.pos = new THREE.Vector3();
    },
 
    tick: function () {
      const renderer  = this.el.sceneEl.renderer;
      const xrFrame   = renderer.xr.getFrame();
      const xrSession = renderer.xr.getSession();
 
      if (!xrFrame || !xrSession) return;
 
      const refSpace = renderer.xr.getReferenceSpace();
 
      for (const src of xrSession.inputSources) {
        if (!src.hand || src.handedness !== this.data.hand) continue;
 
        for (const [name, dotEl] of Object.entries(this.jointEls)) {
          const joint = src.hand.get(name);
          if (!joint) continue;
          const pose = xrFrame.getJointPose(joint, refSpace);
          if (!pose) continue;
 
          const p = pose.transform.position;
          dotEl.object3D.position.set(p.x, p.y, p.z);
          dotEl.setAttribute('visible', true);
        }
        return;
      }
 
      // No hand found — hide dots
      Object.values(this.jointEls).forEach(d => d.setAttribute('visible', false));
    }
 
  });
 
 
  // =====================================================
  // WEBXR GRAB COMPONENT
  // Reads index tip + thumb tip distance directly from
  // WebXR API each frame. When pinching, grabs the
  // nearest .grabbable within grabDistance metres of
  // the INDEX FINGERTIP (most natural grab point).
  // =====================================================
 
  AFRAME.registerComponent('webxr-grab', {
 
    schema: {
      hand:         { type: 'string', default: 'right' },
      pinchDist:    { type: 'number', default: 0.04  },
      grabDistance: { type: 'number', default: 0.25  }
    },
 
    init: function () {
      this.grabbing      = false;
      this.grabbedEl     = null;
      this.wasPinching   = false;
 
      this.thumbTip      = new THREE.Vector3();
      this.indexTip      = new THREE.Vector3();
      this.modelPos      = new THREE.Vector3();
      this.prevIndexPos  = new THREE.Vector3();
      this.prevIndexQuat = new THREE.Quaternion();
      this.indexQuat     = new THREE.Quaternion();
      this.deltaPos      = new THREE.Vector3();
      this.deltaQuat     = new THREE.Quaternion();
    },
 
    tick: function () {
      const renderer  = this.el.sceneEl.renderer;
      const xrFrame   = renderer.xr.getFrame();
      const xrSession = renderer.xr.getSession();
 
      if (!xrFrame || !xrSession) return;
 
      const refSpace = renderer.xr.getReferenceSpace();
 
      let handInput = null;
      for (const src of xrSession.inputSources) {
        if (src.hand && src.handedness === this.data.hand) {
          handInput = src;
          break;
        }
      }
 
      if (!handInput) return;
 
      const thumbJoint = handInput.hand.get('thumb-tip');
      const indexJoint = handInput.hand.get('index-finger-tip');
 
      if (!thumbJoint || !indexJoint) return;
 
      const thumbPose = xrFrame.getJointPose(thumbJoint, refSpace);
      const indexPose = xrFrame.getJointPose(indexJoint, refSpace);
 
      if (!thumbPose || !indexPose) return;
 
      this.thumbTip.set(
        thumbPose.transform.position.x,
        thumbPose.transform.position.y,
        thumbPose.transform.position.z
      );
 
      this.indexTip.set(
        indexPose.transform.position.x,
        indexPose.transform.position.y,
        indexPose.transform.position.z
      );
 
      this.indexQuat.set(
        indexPose.transform.orientation.x,
        indexPose.transform.orientation.y,
        indexPose.transform.orientation.z,
        indexPose.transform.orientation.w
      );
 
      // -------------------------------------------------
      // Pinch detection
      // -------------------------------------------------
 
      const pinchDist  = this.thumbTip.distanceTo(this.indexTip);
      const isPinching = pinchDist < this.data.pinchDist;
 
      // -------------------------------------------------
      // Pinch started — find nearest grabbable
      // Uses INDEX TIP as the grab origin (feels natural)
      // with a generous grabDistance
      // -------------------------------------------------
 
      if (isPinching && !this.wasPinching) {
 
        const candidates = document.querySelectorAll('.grabbable');
        let closest     = null;
        let closestDist = this.data.grabDistance;
 
        candidates.forEach(el => {
          if (!el.object3D.visible) return;
          el.object3D.getWorldPosition(this.modelPos);
          const dist = this.indexTip.distanceTo(this.modelPos);
          if (dist < closestDist) {
            closestDist = dist;
            closest     = el;
          }
        });
 
        if (closest) {
          this.grabbedEl = closest;
          this.grabbing  = true;
          this.prevIndexPos.copy(this.indexTip);
          this.prevIndexQuat.copy(this.indexQuat);
          this.grabbedEl.setAttribute('material', 'emissive: #223322');
        }
      }
 
      // -------------------------------------------------
      // Pinch ended — release
      // -------------------------------------------------
 
      if (!isPinching && this.wasPinching && this.grabbedEl) {
        this.grabbedEl.setAttribute('material', 'emissive: #000000');
        this.grabbedEl = null;
        this.grabbing  = false;
      }
 
      this.wasPinching = isPinching;
 
      // -------------------------------------------------
      // While grabbing — mirror index tip movement
      // -------------------------------------------------
 
      if (this.grabbing && this.grabbedEl) {
        this.deltaPos.subVectors(this.indexTip, this.prevIndexPos);
        this.grabbedEl.object3D.position.add(this.deltaPos);
 
        this.deltaQuat.copy(this.prevIndexQuat).invert();
        this.deltaQuat.premultiply(this.indexQuat);
        this.grabbedEl.object3D.quaternion.premultiply(this.deltaQuat);
 
        this.prevIndexPos.copy(this.indexTip);
        this.prevIndexQuat.copy(this.indexQuat);
      }
    }
 
  });
  </script>
 
</head>
 
<body>
 
<a-scene
  cursor="rayOrigin: mouse"
  webxr="optionalFeatures: hand-tracking"
  renderer="colorManagement: true"
  raycaster="objects: .clickable, .grabbable">
 
  <!-- ENVIRONMENT -->
  <a-sky color="#BBBBBB"></a-sky>
  <a-plane position="0 0 0"   rotation="-90 0 0" width="20" height="20" color="#999999"></a-plane>
  <a-plane position="0 5 -10"                    width="20" height="10" color="#999999"></a-plane>
  <a-plane position="-10 5 0" rotation="0 90 0"  width="20" height="10" color="#555555"></a-plane>
  <a-plane position="10 5 0"  rotation="0 -90 0" width="20" height="10" color="#555555"></a-plane>
  <a-plane position="0 10 0"  rotation="90 0 0"  width="20" height="20" color="#111111"></a-plane>
 
  <!-- DESK -->
  <a-box position="0 0.75 2"      width="2"    height="0.08" depth="1"    color="#5A4A3A"></a-box>
  <a-box position="-0.9 0.35 1.6" width="0.08" height="0.7"  depth="0.08" color="#444444"></a-box>
  <a-box position="0.9 0.35 1.6"  width="0.08" height="0.7"  depth="0.08" color="#444444"></a-box>
  <a-box position="-0.9 0.35 2.4" width="0.08" height="0.7"  depth="0.08" color="#444444"></a-box>
  <a-box position="0.9 0.35 2.4"  width="0.08" height="0.7"  depth="0.08" color="#444444"></a-box>
 
  <!-- LIGHTS -->
  <a-light type="ambient"     intensity="0.8"></a-light>
  <a-light type="directional" intensity="1" position="2 8 4"></a-light>
 
  <!-- BANNER -->
  <a-image
    src="assets/Red Landpower VR Training Academy.svg"
    position="0 5 -9.9"
    width="14" height="6">
  </a-image>
 
  <!-- ========================= -->
  <!-- DESK MODEL 1 — CARBURETOR -->
  <!-- ========================= -->
 
  <a-entity
    id="model1"
    class="grabbable"
    gltf-model="models/carburetor.glb"
    position=".2 1.1 2.2"
    rotation="0 45 0"
    scale=".25 .25 .25"
    visible="true">
  </a-entity>
 
  <!-- ========================= -->
  <!-- DESK MODEL 2 — CLAAS      -->
  <!-- ========================= -->
 
  <a-entity
    id="model2"
    class="grabbable"
    gltf-model="models/CLAAS.glb"
    animation-mixer
    position=".2 1.1 2.2"
    rotation="0 0 0"
    scale="1 1 1"
    visible="false">
  </a-entity>
 
  <!-- ========================= -->
  <!-- PREV / NEXT BUTTONS       -->
  <!-- ========================= -->
 
  <a-box
    id="prevButton"
    class="clickable"
    position="-0.78 1 2.3"
    width="0.3" height="0.15" depth="0.08"
    color="#4444ff"
    event-set__enter="_event: mouseenter; color: #6666ff"
    event-set__leave="_event: mouseleave; color: #4444ff">
  </a-box>
  <a-text value="PREV" position="-.93 1 2.35" scale="0.5 0.5 0.5" color="white"></a-text>
 
  <a-box
    id="nextButton"
    class="clickable"
    position="-.8 1.2 2.3"
    width="0.3" height="0.15" depth="0.08"
    color="#44aa44"
    event-set__enter="_event: mouseenter; color: #66cc66"
    event-set__leave="_event: mouseleave; color: #44aa44">
  </a-box>
  <a-text value="NEXT" position="-.95 1.2 2.34" scale="0.5 0.5 0.5" color="white"></a-text>
 
  <!-- ========================= -->
  <!-- BACKGROUND — RIGHT CORNER -->
  <!-- ========================= -->
 
  <a-entity
    gltf-model="models/claas_630.glb"
    position="6 -0.7 -5"
    rotation="0 25 0"
    scale="0.012 0.012 0.012">
  </a-entity>
 
  <!-- ========================= -->
  <!-- BACKGROUND — LEFT CORNER  -->
  <!-- ========================= -->
 
  <a-entity
    gltf-model="models/engine.glb"
    position="-4 0 -6"
    rotation="0 -45 0"
    scale=".5 .5 .5">
  </a-entity>
 
  <!-- ========================= -->
  <!-- CAMERA / VR RIG           -->
  <!-- ========================= -->
 
  <a-entity id="rig" position="0 0 3">
 
    <a-camera position="0 1.2 0">
      <a-cursor rayOrigin="mouse" fuse="false" material="opacity: 0"></a-cursor>
    </a-camera>
 
    <!-- LEFT HAND — visual dots + grab -->
    <a-entity
      id="leftHand"
      hand-visual="hand: left"
      webxr-grab="hand: left">
    </a-entity>
 
    <!-- RIGHT HAND — visual dots + grab -->
    <a-entity
      id="rightHand"
      hand-visual="hand: right"
      webxr-grab="hand: right">
    </a-entity>
 
  </a-entity>
 
  <!-- ========================= -->
  <!-- MODEL SWITCHING           -->
  <!-- ========================= -->
 
  <script>
  window.onload = function () {
 
    let currentModel = 1;
 
    const model1     = document.querySelector('#model1');
    const model2     = document.querySelector('#model2');
    const prevButton = document.querySelector('#prevButton');
    const nextButton = document.querySelector('#nextButton');
 
    function showModel(n) {
      model1.setAttribute('visible', n === 1);
      model2.setAttribute('visible', n === 2);
    }
 
    nextButton.addEventListener('mousedown', function () {
      currentModel = currentModel >= 2 ? 1 : currentModel + 1;
      showModel(currentModel);
    });
 
    prevButton.addEventListener('mousedown', function () {
      currentModel = currentModel <= 1 ? 2 : currentModel - 1;
      showModel(currentModel);
    });
 
  };
  </script>
 
</a-scene>
</body>
</html>
