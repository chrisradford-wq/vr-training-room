<!DOCTYPE html>
<html>
 
<head>
  <meta charset="utf-8">
  <title>VR Training Room</title>
 
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
  <script src="https://unpkg.com/aframe-event-set-component@5.0.0/dist/aframe-event-set-component.min.js"></script>
 
  <script>
  // =====================================================
  // HAND RENDERER — Smooth silhouette style
  //
  // Each finger segment is a tapered capsule (sphere +
  // cylinder) drawn as a single smooth skin. No skeleton
  // visible — just a clean organic hand outline like
  // Quest 3's native hand tracking appearance.
  //
  // One material per hand = minimal draw calls.
  // depthTest: false = always visible, never clipped.
  // =====================================================
 
  AFRAME.registerComponent('hand-renderer', {
 
    schema: {
      hand:         { type: 'string', default: 'right'   },
      color:        { type: 'color',  default: '#222222'  },
      pinchColor:   { type: 'color',  default: '#ffdd00'  },
      pinchDist:    { type: 'number', default: 0.04       },
      grabDistance: { type: 'number', default: 0.30       },
      opacity:      { type: 'number', default: 0.85       }
    },
 
    init: function () {
 
      this.grabbing    = false;
      this.grabbedEl   = null;
      this.wasPinching = false;
      this.modelPos    = new THREE.Vector3();
      this.prevPos     = new THREE.Vector3();
      this.prevQuat    = new THREE.Quaternion();
      this.curQuat     = new THREE.Quaternion();
      this.deltaPos    = new THREE.Vector3();
      this.deltaQuat   = new THREE.Quaternion();
 
      // All joints we need
      this.JOINTS = [
        'wrist',
        'thumb-metacarpal','thumb-phalanx-proximal',
        'thumb-phalanx-distal','thumb-tip',
        'index-finger-metacarpal','index-finger-phalanx-proximal',
        'index-finger-phalanx-intermediate','index-finger-phalanx-distal',
        'index-finger-tip',
        'middle-finger-metacarpal','middle-finger-phalanx-proximal',
        'middle-finger-phalanx-intermediate','middle-finger-phalanx-distal',
        'middle-finger-tip',
        'ring-finger-metacarpal','ring-finger-phalanx-proximal',
        'ring-finger-phalanx-intermediate','ring-finger-phalanx-distal',
        'ring-finger-tip',
        'pinky-finger-metacarpal','pinky-finger-phalanx-proximal',
        'pinky-finger-phalanx-intermediate','pinky-finger-phalanx-distal',
        'pinky-finger-tip'
      ];
 
      // Finger chains — each segment gets a capsule
      this.FINGERS = [
        ['wrist','thumb-metacarpal','thumb-phalanx-proximal','thumb-phalanx-distal','thumb-tip'],
        ['wrist','index-finger-metacarpal','index-finger-phalanx-proximal','index-finger-phalanx-intermediate','index-finger-phalanx-distal','index-finger-tip'],
        ['wrist','middle-finger-metacarpal','middle-finger-phalanx-proximal','middle-finger-phalanx-intermediate','middle-finger-phalanx-distal','middle-finger-tip'],
        ['wrist','ring-finger-metacarpal','ring-finger-phalanx-proximal','ring-finger-phalanx-intermediate','ring-finger-phalanx-distal','ring-finger-tip'],
        ['wrist','pinky-finger-metacarpal','pinky-finger-phalanx-proximal','pinky-finger-phalanx-intermediate','pinky-finger-phalanx-distal','pinky-finger-tip']
      ];
 
      // Radius per joint type — tapers toward fingertip
      this.RADII = {
        'wrist': 0.018,
        'metacarpal': 0.010,
        'proximal': 0.009,
        'intermediate': 0.008,
        'distal': 0.007,
        'tip': 0.006,
        'thumb-metacarpal': 0.011,
        'thumb-phalanx-proximal': 0.010,
        'thumb-phalanx-distal': 0.009,
        'thumb-tip': 0.008
      };
 
      const getRadius = (name) => {
        if (this.RADII[name]) return this.RADII[name];
        if (name.includes('tip'))          return 0.006;
        if (name.includes('distal'))       return 0.007;
        if (name.includes('intermediate')) return 0.008;
        if (name.includes('proximal'))     return 0.009;
        if (name.includes('metacarpal'))   return 0.010;
        return 0.009;
      };
      this.getRadius = getRadius;
 
      // Single shared material per hand
      const makeMat = (color, opacity) => {
        const mat = new THREE.MeshPhongMaterial({
          color:       new THREE.Color(color),
          shininess:   40,
          transparent: opacity < 1,
          opacity:     opacity
        });
        mat.depthTest   = false;
        mat.depthWrite  = false;
        mat.needsUpdate = true;
        return mat;
      };
 
      this.matSkin   = makeMat(this.data.color,      this.data.opacity);
      this.matPinch  = makeMat(this.data.pinchColor, this.data.opacity);
 
      // Build capsule meshes for every segment between joints
      // A capsule = sphere at each joint end + cylinder between
      this.segments = [];
 
      // Palm pad — large sphere at wrist
      const palmSphere = new THREE.Mesh(
        new THREE.SphereGeometry(1, 12, 12),
        this.matSkin
      );
      palmSphere.frustumCulled = false;
      palmSphere.renderOrder   = 999;
      this.el.sceneEl.object3D.add(palmSphere);
      this.palmSphere = palmSphere;
 
      // For each finger chain, build joint spheres + segment cylinders
      this.FINGERS.forEach((chain, fingerIdx) => {
        for (let i = 0; i < chain.length - 1; i++) {
          const nameA = chain[i];
          const nameB = chain[i + 1];
 
          // Skip full palm segments (wrist to metacarpal) for non-thumb
          // to avoid overfilling the palm
          const isPalmSeg = nameA === 'wrist' && fingerIdx > 0;
 
          const rA = getRadius(nameA);
          const rB = getRadius(nameB);
 
          // Sphere at joint A
          const sA = new THREE.Mesh(
            new THREE.SphereGeometry(1, 10, 10),
            this.matSkin
          );
          sA.scale.setScalar(rA);
          sA.frustumCulled = false;
          sA.renderOrder   = 999;
          sA.visible       = !isPalmSeg;
          this.el.sceneEl.object3D.add(sA);
 
          // Sphere at joint B (tip cap)
          const sB = new THREE.Mesh(
            new THREE.SphereGeometry(1, 10, 10),
            this.matSkin
          );
          sB.scale.setScalar(rB);
          sB.frustumCulled = false;
          sB.renderOrder   = 999;
          sB.visible       = !isPalmSeg;
          this.el.sceneEl.object3D.add(sB);
 
          // Cylinder connecting them
          const cyl = new THREE.Mesh(
            new THREE.CylinderGeometry(1, 1, 1, 10),
            this.matSkin
          );
          cyl.frustumCulled = false;
          cyl.renderOrder   = 999;
          cyl.visible       = !isPalmSeg;
          this.el.sceneEl.object3D.add(cyl);
 
          this.segments.push({ nameA, nameB, rA, rB, sA, sB, cyl, isPalmSeg,
            isPinchSeg: (nameB === 'thumb-tip' || nameB === 'index-finger-tip')
          });
        }
      });
 
      // Joint position cache
      this.jointPositions = {};
      this.JOINTS.forEach(n => { this.jointPositions[n] = new THREE.Vector3(); });
 
      this._mid  = new THREE.Vector3();
      this._dir  = new THREE.Vector3();
      this._up   = new THREE.Vector3(0, 1, 0);
      this._quat = new THREE.Quaternion();
    },
 
    tick: function () {
      const renderer  = this.el.sceneEl.renderer;
      const xrFrame   = renderer.xr.getFrame();
      const xrSession = renderer.xr.getSession();
 
      if (!xrFrame || !xrSession) { this._hideAll(); return; }
 
      const refSpace = renderer.xr.getReferenceSpace();
      let handInput  = null;
 
      for (const src of xrSession.inputSources) {
        if (src.hand && src.handedness === this.data.hand) {
          handInput = src; break;
        }
      }
 
      if (!handInput) { this._hideAll(); return; }
 
      // Rig offset
      const rig    = document.querySelector('#rig');
      const rigPos = rig ? rig.object3D.position : new THREE.Vector3();
 
      // Read joint positions
      let allValid = true;
      this.JOINTS.forEach(name => {
        const joint = handInput.hand.get(name);
        if (!joint) { allValid = false; return; }
        const pose = xrFrame.getJointPose(joint, refSpace);
        if (!pose)  { allValid = false; return; }
        const p = pose.transform.position;
        this.jointPositions[name].set(
          p.x + rigPos.x,
          p.y + rigPos.y,
          p.z + rigPos.z
        );
      });
 
      if (!allValid) { this._hideAll(); return; }
 
      // Palm sphere at wrist
      const wristPos = this.jointPositions['wrist'];
      this.palmSphere.position.copy(wristPos);
      this.palmSphere.scale.setScalar(0.022);
      this.palmSphere.visible = true;
 
      // Pinch detection
      const thumbPos   = this.jointPositions['thumb-tip'];
      const indexPos   = this.jointPositions['index-finger-tip'];
      const isPinching = thumbPos.distanceTo(indexPos) < this.data.pinchDist;
 
      // Update each segment
      this.segments.forEach(seg => {
        if (seg.isPalmSeg) return;
 
        const posA = this.jointPositions[seg.nameA];
        const posB = this.jointPositions[seg.nameB];
 
        // Pick material — yellow for pinch segments when pinching
        const mat = (isPinching && seg.isPinchSeg) ? this.matPinch : this.matSkin;
 
        // Joint sphere A
        seg.sA.position.copy(posA);
        seg.sA.scale.setScalar(seg.rA);
        seg.sA.material = mat;
        seg.sA.visible  = true;
 
        // Joint sphere B
        seg.sB.position.copy(posB);
        seg.sB.scale.setScalar(seg.rB);
        seg.sB.material = mat;
        seg.sB.visible  = true;
 
        // Cylinder between A and B
        this._mid.addVectors(posA, posB).multiplyScalar(0.5);
        this._dir.subVectors(posB, posA);
        const length = this._dir.length();
 
        if (length < 0.001) { seg.cyl.visible = false; return; }
 
        this._dir.normalize();
        this._quat.setFromUnitVectors(this._up, this._dir);
 
        seg.cyl.position.copy(this._mid);
        seg.cyl.quaternion.copy(this._quat);
        // Taper: top radius = rB, bottom = rA
        seg.cyl.scale.set(seg.rB, length, seg.rB);
        seg.cyl.material = mat;
        seg.cyl.visible  = true;
      });
 
      // -----------------------------------------------
      // Grab logic
      // -----------------------------------------------
 
      if (isPinching && !this.wasPinching) {
        const candidates = document.querySelectorAll('.grabbable');
        let closest     = null;
        let closestDist = this.data.grabDistance;
 
        candidates.forEach(el => {
          if (!el.object3D.visible) return;
          el.object3D.getWorldPosition(this.modelPos);
          const dist = indexPos.distanceTo(this.modelPos);
          if (dist < closestDist) { closestDist = dist; closest = el; }
        });
 
        if (closest) {
          this.grabbedEl = closest;
          this.grabbing  = true;
          this.prevPos.copy(indexPos);
          const indexJoint = handInput.hand.get('index-finger-tip');
          const indexPose  = xrFrame.getJointPose(indexJoint, refSpace);
          if (indexPose) {
            const o = indexPose.transform.orientation;
            this.prevQuat.set(o.x, o.y, o.z, o.w);
          }
          this.grabbedEl.setAttribute('material', 'emissive: #223322');
        }
      }
 
      if (!isPinching && this.wasPinching && this.grabbedEl) {
        this.grabbedEl.setAttribute('material', 'emissive: #000000');
        this.grabbedEl = null;
        this.grabbing  = false;
      }
 
      this.wasPinching = isPinching;
 
      if (this.grabbing && this.grabbedEl) {
        this.deltaPos.subVectors(indexPos, this.prevPos);
        this.grabbedEl.object3D.position.add(this.deltaPos);
        this.prevPos.copy(indexPos);
 
        const indexJoint = handInput.hand.get('index-finger-tip');
        const indexPose  = xrFrame.getJointPose(indexJoint, refSpace);
        if (indexPose) {
          const o = indexPose.transform.orientation;
          this.curQuat.set(o.x, o.y, o.z, o.w);
          this.deltaQuat.copy(this.prevQuat).invert();
          this.deltaQuat.premultiply(this.curQuat);
          this.grabbedEl.object3D.quaternion.premultiply(this.deltaQuat);
          this.prevQuat.copy(this.curQuat);
        }
      }
    },
 
    _hideAll: function () {
      this.palmSphere.visible = false;
      this.segments.forEach(s => {
        s.sA.visible  = false;
        s.sB.visible  = false;
        s.cyl.visible = false;
      });
    }
 
  });
  </script>
 
</head>
 
<body>
 
<a-scene
  cursor="rayOrigin: mouse"
  webxr="optionalFeatures: hand-tracking"
  renderer="colorManagement: true"
  raycaster="objects: .clickable, .grabbable">
 
  <!-- ENVIRONMENT -->
  <a-sky color="#BBBBBB"></a-sky>
  <a-plane position="0 0 0"   rotation="-90 0 0" width="20" height="20" color="#999999"></a-plane>
  <a-plane position="0 5 -10"                    width="20" height="10" color="#999999"></a-plane>
  <a-plane position="-10 5 0" rotation="0 90 0"  width="20" height="10" color="#555555"></a-plane>
  <a-plane position="10 5 0"  rotation="0 -90 0" width="20" height="10" color="#555555"></a-plane>
  <a-plane position="0 10 0"  rotation="90 0 0"  width="20" height="20" color="#111111"></a-plane>
 
  <!-- DESK -->
  <a-box position="0 0.75 2"      width="2"    height="0.08" depth="1"    color="#5A4A3A"></a-box>
  <a-box position="-0.9 0.35 1.6" width="0.08" height="0.7"  depth="0.08" color="#444444"></a-box>
  <a-box position="0.9 0.35 1.6"  width="0.08" height="0.7"  depth="0.08" color="#444444"></a-box>
  <a-box position="-0.9 0.35 2.4" width="0.08" height="0.7"  depth="0.08" color="#444444"></a-box>
  <a-box position="0.9 0.35 2.4"  width="0.08" height="0.7"  depth="0.08" color="#444444"></a-box>
 
  <!-- LIGHTS -->
  <a-light type="ambient"     intensity="0.8"></a-light>
  <a-light type="directional" intensity="1" position="2 8 4"></a-light>
 
  <!-- BANNER -->
  <a-image
    src="assets/Red Landpower VR Training Academy.svg"
    position="0 5 -9.9"
    width="14" height="6">
  </a-image>
 
  <!-- DESK MODEL 1 — CARBURETOR -->
  <a-entity
    id="model1"
    class="grabbable"
    gltf-model="models/carburetor.glb"
    position=".2 1.1 2.2"
    rotation="0 45 0"
    scale=".25 .25 .25"
    visible="true">
  </a-entity>
 
  <!-- DESK MODEL 2 — CLAAS -->
  <a-entity
    id="model2"
    class="grabbable"
    gltf-model="models/CLAAS.glb"
    animation-mixer
    position=".2 1.1 2.2"
    rotation="0 0 0"
    scale="1 1 1"
    visible="false">
  </a-entity>
 
  <!-- PREV / NEXT BUTTONS -->
  <a-box
    id="prevButton" class="clickable"
    position="-0.78 1 2.3"
    width="0.3" height="0.15" depth="0.08"
    color="#4444ff"
    event-set__enter="_event: mouseenter; color: #6666ff"
    event-set__leave="_event: mouseleave; color: #4444ff">
  </a-box>
  <a-text value="PREV" position="-.93 1 2.35" scale="0.5 0.5 0.5" color="white"></a-text>
 
  <a-box
    id="nextButton" class="clickable"
    position="-.8 1.2 2.3"
    width="0.3" height="0.15" depth="0.08"
    color="#44aa44"
    event-set__enter="_event: mouseenter; color: #66cc66"
    event-set__leave="_event: mouseleave; color: #44aa44">
  </a-box>
  <a-text value="NEXT" position="-.95 1.2 2.34" scale="0.5 0.5 0.5" color="white"></a-text>
 
  <!-- BACKGROUND MODELS -->
  <a-entity
    gltf-model="models/claas_630.glb"
    position="6 -0.7 -5"
    rotation="0 25 0"
    scale="0.012 0.012 0.012">
  </a-entity>
 
  <a-entity
    gltf-model="models/engine.glb"
    position="-4 0 -6"
    rotation="0 -45 0"
    scale=".5 .5 .5">
  </a-entity>
 
  <!-- CAMERA / VR RIG -->
  <a-entity id="rig" position="0 0 3">
 
    <a-camera position="0 1.2 0">
      <a-cursor rayOrigin="mouse" fuse="false" material="opacity: 0"></a-cursor>
    </a-camera>
 
    <a-entity id="leftHand"  hand-renderer="hand: left;  color: #222222; opacity: 0.85"></a-entity>
    <a-entity id="rightHand" hand-renderer="hand: right; color: #222222; opacity: 0.85"></a-entity>
 
  </a-entity>
 
  <!-- MODEL SWITCHING -->
  <script>
  window.onload = function () {
    let currentModel = 1;
    const model1     = document.querySelector('#model1');
    const model2     = document.querySelector('#model2');
    const prevButton = document.querySelector('#prevButton');
    const nextButton = document.querySelector('#nextButton');
 
    function showModel(n) {
      model1.setAttribute('visible', n === 1);
      model2.setAttribute('visible', n === 2);
    }
 
    nextButton.addEventListener('mousedown', function () {
      currentModel = currentModel >= 2 ? 1 : currentModel + 1;
      showModel(currentModel);
    });
 
    prevButton.addEventListener('mousedown', function () {
      currentModel = currentModel <= 1 ? 2 : currentModel - 1;
      showModel(currentModel);
    });
  };
  </script>
 
</a-scene>
</body>
</html>
