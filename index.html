<!DOCTYPE html>
<html>
 
<head>
  <meta charset="utf-8">
  <title>VR Training Room</title>
 
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
  <script src="https://unpkg.com/aframe-event-set-component@5.0.0/dist/aframe-event-set-component.min.js"></script>
 
  <script>
  // =====================================================
  // HAND RENDERER COMPONENT
  // Draws a silhouette-style hand using WebXR joint
  // positions. Each joint = a flat dark sphere.
  // Bones between joints = thin cylinders.
  // Pinching turns the index + thumb yellow.
  // =====================================================
 
  AFRAME.registerComponent('hand-renderer', {
 
    schema: {
      hand:      { type: 'string',  default: 'right' },
      color:     { type: 'color',   default: '#1a1a1a' },
      pinchDist: { type: 'number',  default: 0.04 },
      grabDistance: { type: 'number', default: 0.30 }
    },
 
    init: function () {
      this.grabbing    = false;
      this.grabbedEl   = null;
      this.wasPinching = false;
 
      this.thumbTip  = new THREE.Vector3();
      this.indexTip  = new THREE.Vector3();
      this.modelPos  = new THREE.Vector3();
      this.prevPos   = new THREE.Vector3();
      this.prevQuat  = new THREE.Quaternion();
      this.curQuat   = new THREE.Quaternion();
      this.deltaPos  = new THREE.Vector3();
      this.deltaQuat = new THREE.Quaternion();
 
      // All 25 WebXR hand joints
      this.JOINTS = [
        'wrist',
        'thumb-metacarpal', 'thumb-phalanx-proximal',
        'thumb-phalanx-distal', 'thumb-tip',
        'index-finger-metacarpal', 'index-finger-phalanx-proximal',
        'index-finger-phalanx-intermediate', 'index-finger-phalanx-distal',
        'index-finger-tip',
        'middle-finger-metacarpal', 'middle-finger-phalanx-proximal',
        'middle-finger-phalanx-intermediate', 'middle-finger-phalanx-distal',
        'middle-finger-tip',
        'ring-finger-metacarpal', 'ring-finger-phalanx-proximal',
        'ring-finger-phalanx-intermediate', 'ring-finger-phalanx-distal',
        'ring-finger-tip',
        'pinky-finger-metacarpal', 'pinky-finger-phalanx-proximal',
        'pinky-finger-phalanx-intermediate', 'pinky-finger-phalanx-distal',
        'pinky-finger-tip'
      ];
 
      // Bone connections: pairs of joint names
      this.BONES = [
        ['wrist','thumb-metacarpal'],
        ['thumb-metacarpal','thumb-phalanx-proximal'],
        ['thumb-phalanx-proximal','thumb-phalanx-distal'],
        ['thumb-phalanx-distal','thumb-tip'],
        ['wrist','index-finger-metacarpal'],
        ['index-finger-metacarpal','index-finger-phalanx-proximal'],
        ['index-finger-phalanx-proximal','index-finger-phalanx-intermediate'],
        ['index-finger-phalanx-intermediate','index-finger-phalanx-distal'],
        ['index-finger-phalanx-distal','index-finger-tip'],
        ['wrist','middle-finger-metacarpal'],
        ['middle-finger-metacarpal','middle-finger-phalanx-proximal'],
        ['middle-finger-phalanx-proximal','middle-finger-phalanx-intermediate'],
        ['middle-finger-phalanx-intermediate','middle-finger-phalanx-distal'],
        ['middle-finger-phalanx-distal','middle-finger-tip'],
        ['wrist','ring-finger-metacarpal'],
        ['ring-finger-metacarpal','ring-finger-phalanx-proximal'],
        ['ring-finger-phalanx-proximal','ring-finger-phalanx-intermediate'],
        ['ring-finger-phalanx-intermediate','ring-finger-phalanx-distal'],
        ['ring-finger-phalanx-distal','ring-finger-tip'],
        ['wrist','pinky-finger-metacarpal'],
        ['pinky-finger-metacarpal','pinky-finger-phalanx-proximal'],
        ['pinky-finger-phalanx-proximal','pinky-finger-phalanx-intermediate'],
        ['pinky-finger-phalanx-intermediate','pinky-finger-phalanx-distal'],
        ['pinky-finger-phalanx-distal','pinky-finger-tip'],
        ['index-finger-metacarpal','middle-finger-metacarpal'],
        ['middle-finger-metacarpal','ring-finger-metacarpal'],
        ['ring-finger-metacarpal','pinky-finger-metacarpal']
      ];
 
      // Build joint spheres
      this.jointMeshes = {};
      this.JOINTS.forEach(name => {
        const el = document.createElement('a-sphere');
        const isPinchJoint = name === 'thumb-tip' || name === 'index-finger-tip';
        el.setAttribute('radius', name === 'wrist' ? 0.013 : 0.007);
        el.setAttribute('color', this.data.color);
        el.setAttribute('material', 'shader: flat; depthTest: false');
        el.setAttribute('visible', false);
        this.el.sceneEl.appendChild(el);
        this.jointMeshes[name] = el;
      });
 
      // Build bone cylinders
      this.boneMeshes = [];
      this.BONES.forEach(() => {
        const el = document.createElement('a-cylinder');
        el.setAttribute('radius', 0.005);
        el.setAttribute('color', this.data.color);
        el.setAttribute('material', 'shader: flat; depthTest: false');
        el.setAttribute('visible', false);
        this.el.sceneEl.appendChild(el);
        this.boneMeshes.push(el);
      });
 
      this.jointPositions = {};
      this.JOINTS.forEach(n => {
        this.jointPositions[n] = new THREE.Vector3();
      });
 
      this._boneStart = new THREE.Vector3();
      this._boneEnd   = new THREE.Vector3();
      this._boneMid   = new THREE.Vector3();
      this._boneDir   = new THREE.Vector3();
      this._up        = new THREE.Vector3(0, 1, 0);
      this._quat      = new THREE.Quaternion();
    },
 
    tick: function () {
      const renderer  = this.el.sceneEl.renderer;
      const xrFrame   = renderer.xr.getFrame();
      const xrSession = renderer.xr.getSession();
 
      if (!xrFrame || !xrSession) return;
 
      const refSpace = renderer.xr.getReferenceSpace();
      let handInput  = null;
 
      for (const src of xrSession.inputSources) {
        if (src.hand && src.handedness === this.data.hand) {
          handInput = src;
          break;
        }
      }
 
      if (!handInput) {
        // Hide everything if hand not found
        this.JOINTS.forEach(n => this.jointMeshes[n].setAttribute('visible', false));
        this.boneMeshes.forEach(b => b.setAttribute('visible', false));
        return;
      }
 
      // Read all joint positions
      let allValid = true;
      this.JOINTS.forEach(name => {
        const joint = handInput.hand.get(name);
        if (!joint) { allValid = false; return; }
        const pose = xrFrame.getJointPose(joint, refSpace);
        if (!pose)  { allValid = false; return; }
        const p = pose.transform.position;
        this.jointPositions[name].set(p.x, p.y, p.z);
      });
 
      if (!allValid) return;
 
      // Update joint sphere positions
      this.JOINTS.forEach(name => {
        const el = this.jointMeshes[name];
        const pos = this.jointPositions[name];
        el.object3D.position.copy(pos);
        el.setAttribute('visible', true);
      });
 
      // Update bone cylinders
      this.BONES.forEach((pair, i) => {
        const boneEl = this.boneMeshes[i];
        const start  = this.jointPositions[pair[0]];
        const end    = this.jointPositions[pair[1]];
 
        this._boneMid.addVectors(start, end).multiplyScalar(0.5);
        this._boneDir.subVectors(end, start);
        const length = this._boneDir.length();
        this._boneDir.normalize();
 
        this._quat.setFromUnitVectors(this._up, this._boneDir);
 
        boneEl.object3D.position.copy(this._boneMid);
        boneEl.object3D.quaternion.copy(this._quat);
        boneEl.setAttribute('height', length);
        boneEl.setAttribute('visible', true);
      });
 
      // -----------------------------------------------
      // Pinch detection + grab logic
      // -----------------------------------------------
 
      const thumbPos = this.jointPositions['thumb-tip'];
      const indexPos = this.jointPositions['index-finger-tip'];
      const isPinching = thumbPos.distanceTo(indexPos) < this.data.pinchDist;
 
      // Highlight pinch joints yellow when pinching
      const pinchColor = isPinching ? '#ffdd00' : this.data.color;
      this.jointMeshes['thumb-tip'].setAttribute('color', pinchColor);
      this.jointMeshes['index-finger-tip'].setAttribute('color', pinchColor);
 
      // Grab nearest grabbable on pinch start
      if (isPinching && !this.wasPinching) {
 
        const candidates = document.querySelectorAll('.grabbable');
        let closest     = null;
        let closestDist = this.data.grabDistance;
 
        candidates.forEach(el => {
          if (!el.object3D.visible) return;
          el.object3D.getWorldPosition(this.modelPos);
          const dist = indexPos.distanceTo(this.modelPos);
          if (dist < closestDist) {
            closestDist = dist;
            closest = el;
          }
        });
 
        if (closest) {
          this.grabbedEl = closest;
          this.grabbing  = true;
          this.prevPos.copy(indexPos);
 
          // Get index finger orientation for rotation
          const indexJoint = handInput.hand.get('index-finger-tip');
          const indexPose  = xrFrame.getJointPose(indexJoint, refSpace);
          if (indexPose) {
            const o = indexPose.transform.orientation;
            this.prevQuat.set(o.x, o.y, o.z, o.w);
          }
 
          this.grabbedEl.setAttribute('material', 'emissive: #223322');
        }
      }
 
      // Release on pinch end
      if (!isPinching && this.wasPinching && this.grabbedEl) {
        this.grabbedEl.setAttribute('material', 'emissive: #000000');
        this.grabbedEl = null;
        this.grabbing  = false;
      }
 
      this.wasPinching = isPinching;
 
      // Move and rotate grabbed model
      if (this.grabbing && this.grabbedEl) {
        this.deltaPos.subVectors(indexPos, this.prevPos);
        this.grabbedEl.object3D.position.add(this.deltaPos);
        this.prevPos.copy(indexPos);
 
        const indexJoint = handInput.hand.get('index-finger-tip');
        const indexPose  = xrFrame.getJointPose(indexJoint, refSpace);
        if (indexPose) {
          const o = indexPose.transform.orientation;
          this.curQuat.set(o.x, o.y, o.z, o.w);
          this.deltaQuat.copy(this.prevQuat).invert();
          this.deltaQuat.premultiply(this.curQuat);
          this.grabbedEl.object3D.quaternion.premultiply(this.deltaQuat);
          this.prevQuat.copy(this.curQuat);
        }
      }
    }
  });
  </script>
 
</head>
 
<body>
 
<a-scene
  cursor="rayOrigin: mouse"
  webxr="optionalFeatures: hand-tracking"
  renderer="colorManagement: true"
  raycaster="objects: .clickable, .grabbable">
 
  <!-- ENVIRONMENT -->
  <a-sky color="#BBBBBB"></a-sky>
  <a-plane position="0 0 0"   rotation="-90 0 0" width="20" height="20" color="#999999"></a-plane>
  <a-plane position="0 5 -10"                    width="20" height="10" color="#999999"></a-plane>
  <a-plane position="-10 5 0" rotation="0 90 0"  width="20" height="10" color="#555555"></a-plane>
  <a-plane position="10 5 0"  rotation="0 -90 0" width="20" height="10" color="#555555"></a-plane>
  <a-plane position="0 10 0"  rotation="90 0 0"  width="20" height="20" color="#111111"></a-plane>
 
  <!-- DESK -->
  <a-box position="0 0.75 2"      width="2"    height="0.08" depth="1"    color="#5A4A3A"></a-box>
  <a-box position="-0.9 0.35 1.6" width="0.08" height="0.7"  depth="0.08" color="#444444"></a-box>
  <a-box position="0.9 0.35 1.6"  width="0.08" height="0.7"  depth="0.08" color="#444444"></a-box>
  <a-box position="-0.9 0.35 2.4" width="0.08" height="0.7"  depth="0.08" color="#444444"></a-box>
  <a-box position="0.9 0.35 2.4"  width="0.08" height="0.7"  depth="0.08" color="#444444"></a-box>
 
  <!-- LIGHTS -->
  <a-light type="ambient"     intensity="0.8"></a-light>
  <a-light type="directional" intensity="1" position="2 8 4"></a-light>
 
  <!-- BANNER -->
  <a-image
    src="assets/Red Landpower VR Training Academy.svg"
    position="0 5 -9.9"
    width="14" height="6">
  </a-image>
 
  <!-- ========================= -->
  <!-- DESK MODEL 1 — CARBURETOR -->
  <!-- ========================= -->
 
  <a-entity
    id="model1"
    class="grabbable"
    gltf-model="models/carburetor.glb"
    position=".2 1.1 2.2"
    rotation="0 45 0"
    scale=".25 .25 .25"
    visible="true">
  </a-entity>
 
  <!-- ========================= -->
  <!-- DESK MODEL 2 — CLAAS      -->
  <!-- ========================= -->
 
  <a-entity
    id="model2"
    class="grabbable"
    gltf-model="models/CLAAS.glb"
    animation-mixer
    position=".2 1.1 2.2"
    rotation="0 0 0"
    scale="1 1 1"
    visible="false">
  </a-entity>
 
  <!-- PREV / NEXT BUTTONS -->
  <a-box
    id="prevButton" class="clickable"
    position="-0.78 1 2.3"
    width="0.3" height="0.15" depth="0.08"
    color="#4444ff"
    event-set__enter="_event: mouseenter; color: #6666ff"
    event-set__leave="_event: mouseleave; color: #4444ff">
  </a-box>
  <a-text value="PREV" position="-.93 1 2.35" scale="0.5 0.5 0.5" color="white"></a-text>
 
  <a-box
    id="nextButton" class="clickable"
    position="-.8 1.2 2.3"
    width="0.3" height="0.15" depth="0.08"
    color="#44aa44"
    event-set__enter="_event: mouseenter; color: #66cc66"
    event-set__leave="_event: mouseleave; color: #44aa44">
  </a-box>
  <a-text value="NEXT" position="-.95 1.2 2.34" scale="0.5 0.5 0.5" color="white"></a-text>
 
  <!-- BACKGROUND MODELS -->
  <a-entity
    gltf-model="models/claas_630.glb"
    position="6 -0.7 -5"
    rotation="0 25 0"
    scale="0.012 0.012 0.012">
  </a-entity>
 
  <a-entity
    gltf-model="models/engine.glb"
    position="-4 0 -6"
    rotation="0 -45 0"
    scale=".5 .5 .5">
  </a-entity>
 
  <!-- ========================= -->
  <!-- CAMERA / VR RIG           -->
  <!-- ========================= -->
 
  <a-entity id="rig" position="0 0 3">
 
    <a-camera position="0 1.2 0">
      <a-cursor rayOrigin="mouse" fuse="false" material="opacity: 0"></a-cursor>
    </a-camera>
 
    <!-- LEFT HAND — dark silhouette + grab -->
    <a-entity
      id="leftHand"
      hand-renderer="hand: left; color: #1a1a1a">
    </a-entity>
 
    <!-- RIGHT HAND — dark silhouette + grab -->
    <a-entity
      id="rightHand"
      hand-renderer="hand: right; color: #1a1a1a">
    </a-entity>
 
  </a-entity>
 
  <!-- MODEL SWITCHING -->
  <script>
  window.onload = function () {
 
    let currentModel = 1;
    const model1     = document.querySelector('#model1');
    const model2     = document.querySelector('#model2');
    const prevButton = document.querySelector('#prevButton');
    const nextButton = document.querySelector('#nextButton');
 
    function showModel(n) {
      model1.setAttribute('visible', n === 1);
      model2.setAttribute('visible', n === 2);
    }
 
    nextButton.addEventListener('mousedown', function () {
      currentModel = currentModel >= 2 ? 1 : currentModel + 1;
      showModel(currentModel);
    });
 
    prevButton.addEventListener('mousedown', function () {
      currentModel = currentModel <= 1 ? 2 : currentModel - 1;
      showModel(currentModel);
    });
 
  };
  </script>
 
</a-scene>
</body>
</html>
