<!DOCTYPE html>
<html>
 
<head>
  <meta charset="utf-8">
  <title>VR Training Room</title>
 
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
  <script src="https://unpkg.com/aframe-event-set-component@5.0.0/dist/aframe-event-set-component.min.js"></script>
 
  <script>
  // =====================================================
  // GRAB-ROTATE COMPONENT
  // Attach to each controller entity.
  // On gripdown: finds nearest .grabbable within reach,
  // then every tick mirrors controller move + rotation
  // onto the held model. No physics engine needed.
  // =====================================================
 
  AFRAME.registerComponent('grab-rotate', {
 
    schema: {
      grabDistance: { type: 'number', default: 0.3 }  // metres — tune if needed
    },
 
    init: function () {
      this.grabbing        = false;
      this.grabbedEl       = null;
      this.grabDistance    = this.data.grabDistance;
 
      // Reusable Three.js objects
      this.ctrlPos         = new THREE.Vector3();
      this.ctrlQuat        = new THREE.Quaternion();
      this.ctrlScale       = new THREE.Vector3();
      this.prevCtrlPos     = new THREE.Vector3();
      this.prevCtrlQuat    = new THREE.Quaternion();
      this.deltaPos        = new THREE.Vector3();
      this.deltaQuat       = new THREE.Quaternion();
      this.modelPos        = new THREE.Vector3();
 
      this.el.addEventListener('gripdown', this.onGripDown.bind(this));
      this.el.addEventListener('gripup',   this.onGripUp.bind(this));
    },
 
    onGripDown: function () {
      // Get controller world position
      this.el.object3D.matrixWorld.decompose(
        this.ctrlPos, this.ctrlQuat, this.ctrlScale
      );
 
      // Find all .grabbable elements
      const candidates = document.querySelectorAll('.grabbable');
      let closest = null;
      let closestDist = this.grabDistance;
 
      candidates.forEach(el => {
        if (!el.object3D.visible) return;
        el.object3D.getWorldPosition(this.modelPos);
        const dist = this.ctrlPos.distanceTo(this.modelPos);
        if (dist < closestDist) {
          closestDist = dist;
          closest = el;
        }
      });
 
      if (!closest) return;
 
      this.grabbedEl = closest;
      this.grabbing  = true;
 
      // Snapshot starting transform
      this.prevCtrlPos.copy(this.ctrlPos);
      this.prevCtrlQuat.copy(this.ctrlQuat);
 
      console.log('Grabbed:', this.grabbedEl.id, 'dist:', closestDist.toFixed(3));
    },
 
    onGripUp: function () {
      this.grabbing  = false;
      this.grabbedEl = null;
    },
 
    tick: function () {
      if (!this.grabbing || !this.grabbedEl) return;
 
      this.el.object3D.matrixWorld.decompose(
        this.ctrlPos, this.ctrlQuat, this.ctrlScale
      );
 
      // Position delta
      this.deltaPos.subVectors(this.ctrlPos, this.prevCtrlPos);
      this.grabbedEl.object3D.position.add(this.deltaPos);
 
      // Rotation delta
      this.deltaQuat.copy(this.prevCtrlQuat).invert();
      this.deltaQuat.premultiply(this.ctrlQuat);
      this.grabbedEl.object3D.quaternion.premultiply(this.deltaQuat);
 
      // Store for next frame
      this.prevCtrlPos.copy(this.ctrlPos);
      this.prevCtrlQuat.copy(this.ctrlQuat);
    }
 
  });
  </script>
 
</head>
 
<body>
<a-scene cursor="rayOrigin: mouse">
 
  <a-sky color="#BBBBBB"></a-sky>
 
  <!-- FLOOR -->
  <a-plane position="0 0 0" rotation="-90 0 0" width="20" height="20" color="#999999"></a-plane>
 
  <!-- BACK WALL -->
  <a-plane position="0 5 -10" width="20" height="10" color="#999999"></a-plane>
 
  <!-- LEFT WALL -->
  <a-plane position="-10 5 0" rotation="0 90 0" width="20" height="10" color="#555555"></a-plane>
 
  <!-- RIGHT WALL -->
  <a-plane position="10 5 0" rotation="0 -90 0" width="20" height="10" color="#555555"></a-plane>
 
  <!-- CEILING -->
  <a-plane position="0 10 0" rotation="90 0 0" width="20" height="20" color="#1"></a-plane>
 
  <!-- ========================= -->
  <!-- DESK                      -->
  <!-- ========================= -->
 
  <a-box position="0 0.75 2"      width="2"    height="0.08" depth="1"    color="#5A4A3A"></a-box>
  <a-box position="-0.9 0.35 1.6" width="0.08" height="0.7"  depth="0.08" color="#444444"></a-box>
  <a-box position="0.9 0.35 1.6"  width="0.08" height="0.7"  depth="0.08" color="#444444"></a-box>
  <a-box position="-0.9 0.35 2.4" width="0.08" height="0.7"  depth="0.08" color="#444444"></a-box>
  <a-box position="0.9 0.35 2.4"  width="0.08" height="0.7"  depth="0.08" color="#444444"></a-box>
 
  <!-- LIGHTS -->
  <a-light type="ambient"     intensity="0.8"></a-light>
  <a-light type="directional" intensity="1" position="2 8 4"></a-light>
 
  <a-image
    src="assets/Red Landpower VR Training Academy.svg"
    position="0 5 -9.9"
    width="14"
    height="6">
  </a-image>
 
  <!-- ========================= -->
  <!-- MODEL 1                   -->
  <!-- ========================= -->
 
  <a-entity
    id="model1"
    class="grabbable"
    gltf-model="models/carburetor.glb"
    position=".2 1.1 2.2"
    rotation="0 45 0"
    scale=".25 .25 .25"
    visible="true">
  </a-entity>
 
  <!-- ========================= -->
  <!-- MODEL 2                   -->
  <!-- ========================= -->
 
  <a-entity
    id="model2"
    class="grabbable"
    gltf-model="models/worm_drive.glb"
    animation-mixer
    position=".2 1.1 2.2"
    rotation="0 0 0"
    scale="0.007 0.007 0.007"
    visible="false">
  </a-entity>
 
  <!-- ========================= -->
  <!-- PREVIOUS BUTTON           -->
  <!-- ========================= -->
 
  <a-box
    id="prevButton"
    class="clickable"
    position="-0.78 1 2.3"
    width="0.3"
    height="0.15"
    depth="0.08"
    color="#4444ff"
    event-set__enter="_event: mouseenter; color: #6666ff"
    event-set__leave="_event: mouseleave; color: #4444ff">
  </a-box>
  <a-text value="PREV" position="-.93 1 2.35" scale="0.5 0.5 0.5" color="white"></a-text>
 
  <!-- ========================= -->
  <!-- NEXT BUTTON               -->
  <!-- ========================= -->
 
  <a-box
    id="nextButton"
    class="clickable"
    position="-.8 1.2 2.3"
    width="0.3"
    height="0.15"
    depth="0.08"
    color="#44aa44"
    event-set__enter="_event: mouseenter; color: #66cc66"
    event-set__leave="_event: mouseleave; color: #44aa44">
  </a-box>
  <a-text value="NEXT" position="-.95 1.2 2.34" scale="0.5 0.5 0.5" color="white"></a-text>
 
  <!-- ========================= -->
  <!-- CAMERA / VR RIG           -->
  <!-- ========================= -->
 
  <a-entity id="rig" position="0 0 3">
 
    <a-camera position="0 1.2 0">
      <a-cursor rayOrigin="mouse" fuse="false" material="opacity: 0"></a-cursor>
    </a-camera>
 
    <!-- ========================= -->
    <!-- LEFT CONTROLLER           -->
    <!-- Laser ray + grab-rotate   -->
    <!-- ========================= -->
 
    <a-entity
      id="leftHand"
      oculus-touch-controls="hand: left"
      grab-rotate>
 
      <!-- AIMING LASER -->
      <a-entity
        laser-controls="hand: left"
        raycaster="objects: .grabbable, .clickable; far: 5; showLine: true"
        line="color: #FF4444; opacity: 0.6">
      </a-entity>
 
    </a-entity>
 
    <!-- ========================= -->
    <!-- RIGHT CONTROLLER          -->
    <!-- Laser ray + grab-rotate   -->
    <!-- ========================= -->
 
    <a-entity
      id="rightHand"
      oculus-touch-controls="hand: right"
      grab-rotate>
 
      <!-- AIMING LASER -->
      <a-entity
        laser-controls="hand: right"
        raycaster="objects: .grabbable, .clickable; far: 5; showLine: true"
        line="color: #FF4444; opacity: 0.6">
      </a-entity>
 
    </a-entity>
 
  </a-entity>
 
  <!-- ========================= -->
  <!-- MODEL SWITCHING           -->
  <!-- ========================= -->
 
  <script>
  window.onload = function () {
 
    let currentModel = 1;
 
    const model1     = document.querySelector('#model1');
    const model2     = document.querySelector('#model2');
    const prevButton = document.querySelector('#prevButton');
    const nextButton = document.querySelector('#nextButton');
 
    function showModel(n) {
      model1.setAttribute('visible', n === 1);
      model2.setAttribute('visible', n === 2);
    }
 
    nextButton.addEventListener('mousedown', function () {
      currentModel = currentModel >= 2 ? 1 : currentModel + 1;
      showModel(currentModel);
    });
 
    prevButton.addEventListener('mousedown', function () {
      currentModel = currentModel <= 1 ? 2 : currentModel - 1;
      showModel(currentModel);
    });
 
  };
  </script>
 
</a-scene>
</body>
</html>
