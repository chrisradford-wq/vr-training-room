<!DOCTYPE html>
<html>
 
<head>
  <meta charset="utf-8">
  <title>VR Training Room</title>
 
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
  <script src="https://unpkg.com/aframe-event-set-component@5.0.0/dist/aframe-event-set-component.min.js"></script>
 
  <script>
 
  // =====================================================
  // SHARED UTILITIES
  // =====================================================
 
  // Detect pointing gesture:
  // index finger extended, other fingers curled
  function isPointing(hand, jointPositions) {
    const indexTip    = jointPositions['index-finger-tip'];
    const indexMid    = jointPositions['index-finger-phalanx-intermediate'];
    const middleTip   = jointPositions['middle-finger-tip'];
    const middleMid   = jointPositions['middle-finger-phalanx-intermediate'];
    const wrist       = jointPositions['wrist'];
 
    if (!indexTip || !indexMid || !middleTip || !middleMid || !wrist) return false;
 
    // Index extended = tip further from wrist than knuckle
    const indexExtended = indexTip.distanceTo(wrist) > indexMid.distanceTo(wrist) * 1.1;
    // Middle curled = tip close to its knuckle
    const middleCurled  = middleTip.distanceTo(wrist) < middleMid.distanceTo(wrist) * 1.15;
 
    return indexExtended && middleCurled;
  }
 
 
  // =====================================================
  // HAND RENDERER — outline silhouette + pointing detect
  // =====================================================
 
  AFRAME.registerComponent('hand-renderer', {
 
    schema: {
      hand:         { type: 'string', default: 'right'  },
      color:        { type: 'color',  default: '#ffffff' },
      pinchColor:   { type: 'color',  default: '#ffdd00' },
      pointColor:   { type: 'color',  default: '#00aaff' },
      pinchDist:    { type: 'number', default: 0.04      },
      grabDistance: { type: 'number', default: 0.30      },
      outlineWidth: { type: 'number', default: 1.25      }
    },
 
    init: function () {
      this.grabbing      = false;
      this.grabbedEl     = null;
      this.wasPinching   = false;
      this.wasPointing   = false;
      this.pointHoldStart = 0;
      this.pointHoldTime  = 600; // ms to hold point before triggering
      this.pointTarget    = null;
      this.modelPos       = new THREE.Vector3();
      this.prevPos        = new THREE.Vector3();
      this.prevQuat       = new THREE.Quaternion();
      this.curQuat        = new THREE.Quaternion();
      this.deltaPos       = new THREE.Vector3();
      this.deltaQuat      = new THREE.Quaternion();
 
      this.JOINTS = [
        'wrist',
        'thumb-metacarpal','thumb-phalanx-proximal','thumb-phalanx-distal','thumb-tip',
        'index-finger-metacarpal','index-finger-phalanx-proximal',
        'index-finger-phalanx-intermediate','index-finger-phalanx-distal','index-finger-tip',
        'middle-finger-metacarpal','middle-finger-phalanx-proximal',
        'middle-finger-phalanx-intermediate','middle-finger-phalanx-distal','middle-finger-tip',
        'ring-finger-metacarpal','ring-finger-phalanx-proximal',
        'ring-finger-phalanx-intermediate','ring-finger-phalanx-distal','ring-finger-tip',
        'pinky-finger-metacarpal','pinky-finger-phalanx-proximal',
        'pinky-finger-phalanx-intermediate','pinky-finger-phalanx-distal','pinky-finger-tip'
      ];
 
      this.FINGERS = [
        ['wrist','thumb-metacarpal','thumb-phalanx-proximal','thumb-phalanx-distal','thumb-tip'],
        ['wrist','index-finger-metacarpal','index-finger-phalanx-proximal','index-finger-phalanx-intermediate','index-finger-phalanx-distal','index-finger-tip'],
        ['wrist','middle-finger-metacarpal','middle-finger-phalanx-proximal','middle-finger-phalanx-intermediate','middle-finger-phalanx-distal','middle-finger-tip'],
        ['wrist','ring-finger-metacarpal','ring-finger-phalanx-proximal','ring-finger-phalanx-intermediate','ring-finger-phalanx-distal','ring-finger-tip'],
        ['wrist','pinky-finger-metacarpal','pinky-finger-phalanx-proximal','pinky-finger-phalanx-intermediate','pinky-finger-phalanx-distal','pinky-finger-tip']
      ];
 
      const getRadius = (name) => {
        if (name === 'wrist')                    return 0.018;
        if (name.includes('thumb-metacarpal'))   return 0.011;
        if (name.includes('thumb-phalanx-prox')) return 0.010;
        if (name.includes('thumb-phalanx-dist')) return 0.009;
        if (name.includes('thumb-tip'))          return 0.008;
        if (name.includes('tip'))                return 0.006;
        if (name.includes('distal'))             return 0.007;
        if (name.includes('intermediate'))       return 0.008;
        if (name.includes('proximal'))           return 0.009;
        if (name.includes('metacarpal'))         return 0.010;
        return 0.009;
      };
      this.getRadius = getRadius;
 
      const makeOuterMat = (color) => {
        const mat = new THREE.MeshBasicMaterial({
          color: new THREE.Color(color), side: THREE.BackSide,
          transparent: true, opacity: 0.9, depthTest: false, depthWrite: false
        });
        mat.needsUpdate = true; return mat;
      };
      const makeInnerMat = () => {
        const mat = new THREE.MeshBasicMaterial({
          colorWrite: false, depthTest: false, depthWrite: false,
          transparent: true, opacity: 0
        });
        mat.needsUpdate = true; return mat;
      };
 
      this.matOuter      = makeOuterMat(this.data.color);
      this.matOuterPinch = makeOuterMat(this.data.pinchColor);
      this.matOuterPoint = makeOuterMat(this.data.pointColor);
      this.matInner      = makeInnerMat();
 
      const sphereGeo = new THREE.SphereGeometry(1, 10, 10);
      const cylGeo    = new THREE.CylinderGeometry(1, 1, 1, 10);
      const s         = this.data.outlineWidth;
 
      const addPair = (geo, isPinchSeg) => {
        const outer = new THREE.Mesh(geo, isPinchSeg ? this.matOuterPinch : this.matOuter);
        outer.frustumCulled = false; outer.renderOrder = 998; outer.visible = false;
        this.el.sceneEl.object3D.add(outer);
        const inner = new THREE.Mesh(geo, this.matInner);
        inner.frustumCulled = false; inner.renderOrder = 997; inner.visible = false;
        this.el.sceneEl.object3D.add(inner);
        return { outer, inner };
      };
 
      const palm = addPair(sphereGeo, false);
      this.palmOuter = palm.outer;
      this.palmInner = palm.inner;
 
      this.segments = [];
      this.FINGERS.forEach((chain, fingerIdx) => {
        for (let i = 0; i < chain.length - 1; i++) {
          const nameA      = chain[i];
          const nameB      = chain[i + 1];
          const isPalmSeg  = nameA === 'wrist' && fingerIdx > 0;
          const isPinchSeg = nameB === 'thumb-tip' || nameB === 'index-finger-tip';
          const isIndexSeg = nameA.includes('index') || nameB.includes('index');
          const rA = getRadius(nameA);
          const rB = getRadius(nameB);
          const sA  = addPair(sphereGeo, isPinchSeg);
          const sB  = addPair(sphereGeo, isPinchSeg);
          const cyl = addPair(cylGeo, isPinchSeg);
          this.segments.push({ nameA, nameB, rA, rB, sA, sB, cyl, isPalmSeg, isPinchSeg, isIndexSeg, scale: s });
        }
      });
 
      this.jointPositions = {};
      this.JOINTS.forEach(n => { this.jointPositions[n] = new THREE.Vector3(); });
      this._mid = new THREE.Vector3(); this._dir = new THREE.Vector3();
      this._up  = new THREE.Vector3(0,1,0); this._quat = new THREE.Quaternion();
 
      // Progress ring for point-hold feedback
      this.progressRing = document.createElement('a-torus');
      this.progressRing.setAttribute('radius', '0.015');
      this.progressRing.setAttribute('radius-tubular', '0.002');
      this.progressRing.setAttribute('color', '#00aaff');
      this.progressRing.setAttribute('visible', false);
      this.progressRing.setAttribute('material', 'depthTest: false; shader: flat');
      this.el.sceneEl.appendChild(this.progressRing);
    },
 
    tick: function () {
      const renderer  = this.el.sceneEl.renderer;
      const xrFrame   = renderer.xr.getFrame();
      const xrSession = renderer.xr.getSession();
      if (!xrFrame || !xrSession) { this._hideAll(); return; }
 
      const refSpace = renderer.xr.getReferenceSpace();
      let handInput  = null;
      for (const src of xrSession.inputSources) {
        if (src.hand && src.handedness === this.data.hand) { handInput = src; break; }
      }
      if (!handInput) { this._hideAll(); return; }
 
      const rig    = document.querySelector('#rig');
      const rigPos = rig ? rig.object3D.position : new THREE.Vector3();
 
      let allValid = true;
      this.JOINTS.forEach(name => {
        const joint = handInput.hand.get(name);
        if (!joint) { allValid = false; return; }
        const pose = xrFrame.getJointPose(joint, refSpace);
        if (!pose)  { allValid = false; return; }
        const p = pose.transform.position;
        this.jointPositions[name].set(p.x + rigPos.x, p.y + rigPos.y, p.z + rigPos.z);
      });
      if (!allValid) { this._hideAll(); return; }
 
      // Palm
      const ps = this.data.outlineWidth;
      const wristPos = this.jointPositions['wrist'];
      this.palmOuter.position.copy(wristPos); this.palmOuter.scale.setScalar(0.022 * ps); this.palmOuter.visible = true;
      this.palmInner.position.copy(wristPos); this.palmInner.scale.setScalar(0.022);       this.palmInner.visible = true;
 
      // Detect gestures
      const thumbPos    = this.jointPositions['thumb-tip'];
      const indexPos    = this.jointPositions['index-finger-tip'];
      const isPinching  = thumbPos.distanceTo(indexPos) < this.data.pinchDist;
      const pointing    = isPointing(handInput.hand, this.jointPositions);
 
      // Colour index finger blue when pointing
      this.segments.forEach(seg => {
        if (seg.isPalmSeg) {
          seg.sA.outer.visible = seg.sA.inner.visible =
          seg.sB.outer.visible = seg.sB.inner.visible =
          seg.cyl.outer.visible = seg.cyl.inner.visible = false;
          return;
        }
        const posA = this.jointPositions[seg.nameA];
        const posB = this.jointPositions[seg.nameB];
        const s    = seg.scale;
 
        let mat = this.matOuter;
        if (seg.isPinchSeg && isPinching) mat = this.matOuterPinch;
        else if (seg.isIndexSeg && pointing && this.data.hand === 'right') mat = this.matOuterPoint;
 
        seg.sA.outer.material = seg.sB.outer.material = seg.cyl.outer.material = mat;
 
        seg.sA.outer.position.copy(posA); seg.sA.outer.scale.setScalar(seg.rA * s); seg.sA.outer.visible = true;
        seg.sA.inner.position.copy(posA); seg.sA.inner.scale.setScalar(seg.rA);     seg.sA.inner.visible = true;
        seg.sB.outer.position.copy(posB); seg.sB.outer.scale.setScalar(seg.rB * s); seg.sB.outer.visible = true;
        seg.sB.inner.position.copy(posB); seg.sB.inner.scale.setScalar(seg.rB);     seg.sB.inner.visible = true;
 
        this._mid.addVectors(posA, posB).multiplyScalar(0.5);
        this._dir.subVectors(posB, posA);
        const length = this._dir.length();
        if (length < 0.001) { seg.cyl.outer.visible = seg.cyl.inner.visible = false; return; }
        this._dir.normalize();
        this._quat.setFromUnitVectors(this._up, this._dir);
        seg.cyl.outer.position.copy(this._mid); seg.cyl.outer.quaternion.copy(this._quat); seg.cyl.outer.scale.set(seg.rB * s, length, seg.rB * s); seg.cyl.outer.visible = true;
        seg.cyl.inner.position.copy(this._mid); seg.cyl.inner.quaternion.copy(this._quat); seg.cyl.inner.scale.set(seg.rB, length, seg.rB);         seg.cyl.inner.visible = true;
      });
 
      // -----------------------------------------------
      // RIGHT HAND: point-hold interaction
      // -----------------------------------------------
      if (this.data.hand === 'right') {
 
        const panel      = document.querySelector('#wristPanel');
        const panelComp  = panel ? panel.components['wrist-panel'] : null;
        const panelOpen  = panelComp && panelComp.isVisible();
 
        if (pointing) {
          // Find nearest interactive target (button or card)
          let nearest   = null;
          let nearestD  = 0.15; // must be within 15cm
 
          // Always check wrist button
          const wristBtn = document.querySelector('#wristButton');
          if (wristBtn) {
            const btnPos = new THREE.Vector3();
            wristBtn.object3D.getWorldPosition(btnPos);
            const d = indexPos.distanceTo(btnPos);
            if (d < nearestD) { nearestD = d; nearest = 'button'; }
          }
 
          // Check panel cards if panel is open
          if (panelOpen && panelComp) {
            panelComp.cards.forEach((card, i) => {
              const cp = new THREE.Vector3();
              card.object3D.getWorldPosition(cp);
              const d = indexPos.distanceTo(cp);
              if (d < nearestD) { nearestD = d; nearest = 'card:' + i; }
            });
          }
 
          // Also check grabbable models (when panel closed)
          if (!panelOpen) {
            document.querySelectorAll('.grabbable').forEach(el => {
              if (!el.object3D.visible) return;
              el.object3D.getWorldPosition(this.modelPos);
              const d = indexPos.distanceTo(this.modelPos);
              if (d < nearestD) { nearestD = d; nearest = 'grab:' + el.id; }
            });
          }
 
          if (nearest) {
            // Show progress ring at index tip
            this.progressRing.object3D.position.copy(indexPos);
            this.progressRing.setAttribute('visible', true);
 
            if (this.pointTarget !== nearest) {
              // New target — reset timer
              this.pointTarget    = nearest;
              this.pointHoldStart = Date.now();
            } else {
              // Same target — check if held long enough
              const held = Date.now() - this.pointHoldStart;
              const progress = Math.min(held / this.pointHoldTime, 1);
 
              // Scale ring to show progress
              this.progressRing.object3D.scale.setScalar(1 + progress * 2);
 
              if (held >= this.pointHoldTime) {
                this.pointHoldStart = Date.now() + 99999; // prevent re-trigger
 
                if (nearest === 'button') {
                  panelComp && panelComp.toggle();
                } else if (nearest.startsWith('card:')) {
                  const idx = parseInt(nearest.split(':')[1]);
                  panelComp && panelComp.selectModel(idx);
                } else if (nearest.startsWith('grab:')) {
                  // Grab the model
                  const el = document.querySelector('#' + nearest.split(':')[1]);
                  if (el) {
                    this.grabbedEl = el;
                    this.grabbing  = true;
                    this.prevPos.copy(indexPos);
                    const ij = handInput.hand.get('index-finger-tip');
                    const ip = xrFrame.getJointPose(ij, refSpace);
                    if (ip) { const o = ip.transform.orientation; this.prevQuat.set(o.x, o.y, o.z, o.w); }
                    this.grabbedEl.setAttribute('material', 'emissive: #223322');
                  }
                }
              }
            }
          } else {
            this.pointTarget = null;
            this.progressRing.setAttribute('visible', false);
          }
 
        } else {
          // Not pointing — hide ring, reset target
          this.pointTarget = null;
          this.progressRing.setAttribute('visible', false);
 
          // Release grab if was grabbing
          if (this.grabbing && this.grabbedEl) {
            this.grabbedEl.setAttribute('material', 'emissive: #000000');
            this.grabbedEl = null;
            this.grabbing  = false;
          }
        }
 
        // Move grabbed model
        if (this.grabbing && this.grabbedEl) {
          this.deltaPos.subVectors(indexPos, this.prevPos);
          this.grabbedEl.object3D.position.add(this.deltaPos);
          this.prevPos.copy(indexPos);
          const ij = handInput.hand.get('index-finger-tip');
          const ip = xrFrame.getJointPose(ij, refSpace);
          if (ip) {
            const o = ip.transform.orientation;
            this.curQuat.set(o.x, o.y, o.z, o.w);
            this.deltaQuat.copy(this.prevQuat).invert();
            this.deltaQuat.premultiply(this.curQuat);
            this.grabbedEl.object3D.quaternion.premultiply(this.deltaQuat);
            this.prevQuat.copy(this.curQuat);
          }
        }
      }
 
      this.wasPinching = isPinching;
      this.wasPointing = pointing;
    },
 
    _hideAll: function () {
      this.palmOuter.visible = this.palmInner.visible = false;
      this.segments.forEach(s => {
        s.sA.outer.visible = s.sA.inner.visible =
        s.sB.outer.visible = s.sB.inner.visible =
        s.cyl.outer.visible = s.cyl.inner.visible = false;
      });
    }
  });
 
 
  // =====================================================
  // WRIST PANEL COMPONENT
  // Panel follows left wrist. Wrist button always shows.
  // Point-hold to open/close and select models.
  // =====================================================
 
  AFRAME.registerComponent('wrist-panel', {
 
    init: function () {
      this.visible = false;
 
      this.models = [
        { id: 'model1', name: 'Carburetor', file: 'carburetor.glb'  },
        { id: 'model2', name: 'CLAAS',      file: 'CLAAS.glb'       }
      ];
 
      this.currentModel = 0;
 
      // -----------------------------------------------
      // WRIST BUTTON — always visible on left wrist
      // -----------------------------------------------
      this.wristBtn = document.createElement('a-entity');
      this.wristBtn.setAttribute('id', 'wristButton');
      this.el.sceneEl.appendChild(this.wristBtn);
 
      const btnBg = document.createElement('a-plane');
      btnBg.setAttribute('width',   0.08);
      btnBg.setAttribute('height',  0.03);
      btnBg.setAttribute('color',   '#cc3300');
      btnBg.setAttribute('opacity', '0.9');
      btnBg.setAttribute('material', 'depthTest: false; shader: flat');
      this.wristBtn.appendChild(btnBg);
 
      const btnText = document.createElement('a-text');
      btnText.setAttribute('value',    'MODEL LIST');
      btnText.setAttribute('align',    'center');
      btnText.setAttribute('color',    '#ffffff');
      btnText.setAttribute('scale',    '0.12 0.12 0.12');
      btnText.setAttribute('position', '0 0 0.001');
      btnText.setAttribute('material', 'depthTest: false');
      this.wristBtn.appendChild(btnText);
 
      // -----------------------------------------------
      // PANEL — hidden until button pressed
      // -----------------------------------------------
      this.panel = document.createElement('a-entity');
      this.panel.setAttribute('visible', false);
      this.el.sceneEl.appendChild(this.panel);
 
      // Panel background
      const bg = document.createElement('a-plane');
      bg.setAttribute('width',   0.35);
      bg.setAttribute('height',  this.models.length * 0.12 + 0.06);
      bg.setAttribute('color',   '#111111');
      bg.setAttribute('opacity', '0.92');
      bg.setAttribute('material', 'depthTest: false; shader: flat');
      this.panel.appendChild(bg);
 
      // Title
      const title = document.createElement('a-text');
      title.setAttribute('value',    'SELECT MODEL');
      title.setAttribute('position', `0 ${(this.models.length * 0.12) / 2 + 0.01} 0.002`);
      title.setAttribute('align',    'center');
      title.setAttribute('color',    '#aaaaaa');
      title.setAttribute('scale',    '0.18 0.18 0.18');
      this.panel.appendChild(title);
 
      // Model cards
      this.cards = [];
      this.models.forEach((model, i) => {
        const yPos = (this.models.length / 2 - i - 0.5) * 0.12;
 
        const card = document.createElement('a-plane');
        card.setAttribute('width',    0.30);
        card.setAttribute('height',   0.09);
        card.setAttribute('color',    '#333333');
        card.setAttribute('position', `0 ${yPos} 0.005`);
        card.setAttribute('material', 'depthTest: false; shader: flat');
        this.panel.appendChild(card);
 
        const label = document.createElement('a-text');
        label.setAttribute('value',    model.name);
        label.setAttribute('position', `0 ${yPos + 0.015} 0.007`);
        label.setAttribute('align',    'center');
        label.setAttribute('color',    '#ffffff');
        label.setAttribute('scale',    '0.22 0.22 0.22');
        label.setAttribute('material', 'depthTest: false');
        this.panel.appendChild(label);
 
        const sub = document.createElement('a-text');
        sub.setAttribute('value',    model.file);
        sub.setAttribute('position', `0 ${yPos - 0.018} 0.007`);
        sub.setAttribute('align',    'center');
        sub.setAttribute('color',    '#888888');
        sub.setAttribute('scale',    '0.14 0.14 0.14');
        sub.setAttribute('material', 'depthTest: false');
        this.panel.appendChild(sub);
 
        this.cards.push(card);
      });
 
      this._highlightCurrent();
    },
 
    toggle: function () {
      this.visible = !this.visible;
      this.panel.setAttribute('visible', this.visible);
    },
 
    isVisible: function () { return this.visible; },
 
    selectModel: function (index) {
      this.currentModel = index;
      this.models.forEach((m, i) => {
        const el = document.querySelector('#' + m.id);
        if (el) el.setAttribute('visible', i === index);
      });
      this._highlightCurrent();
      // Auto close
      this.visible = false;
      this.panel.setAttribute('visible', false);
    },
 
    _highlightCurrent: function () {
      this.cards.forEach((card, i) => {
        card.setAttribute('color', i === this.currentModel ? '#1a5c30' : '#333333');
      });
    },
 
    tick: function () {
      const renderer  = this.el.sceneEl.renderer;
      const xrFrame   = renderer.xr.getFrame();
      const xrSession = renderer.xr.getSession();
      if (!xrFrame || !xrSession) return;
 
      const refSpace = renderer.xr.getReferenceSpace();
 
      for (const src of xrSession.inputSources) {
        if (!src.hand || src.handedness !== 'left') continue;
 
        const wristJoint = src.hand.get('wrist');
        const indexMeta  = src.hand.get('index-finger-metacarpal');
        if (!wristJoint || !indexMeta) return;
 
        const wristPose = xrFrame.getJointPose(wristJoint, refSpace);
        const indexPose = xrFrame.getJointPose(indexMeta, refSpace);
        if (!wristPose || !indexPose) return;
 
        const rig    = document.querySelector('#rig');
        const rigPos = rig ? rig.object3D.position : new THREE.Vector3();
 
        const p = wristPose.transform.position;
        const wristVec = new THREE.Vector3(p.x + rigPos.x, p.y + rigPos.y, p.z + rigPos.z);
 
        // Button sits on the inner wrist (palm side)
        // Offset slightly toward palm using orientation
        const o = wristPose.transform.orientation;
        const wristQuat = new THREE.Quaternion(o.x, o.y, o.z, o.w);
        const palmOffset = new THREE.Vector3(0, 0.03, 0.02); // inner wrist offset
        palmOffset.applyQuaternion(wristQuat);
 
        this.wristBtn.object3D.position.copy(wristVec).add(palmOffset);
 
        // Face button toward camera
        const cam = document.querySelector('a-camera');
        if (cam) {
          const camPos = new THREE.Vector3();
          cam.object3D.getWorldPosition(camPos);
          this.wristBtn.object3D.lookAt(camPos);
        }
 
        // Panel floats above wrist button
        if (this.visible) {
          this.panel.object3D.position.copy(wristVec);
          this.panel.object3D.position.y += 0.18;
          if (cam) {
            const camPos = new THREE.Vector3();
            cam.object3D.getWorldPosition(camPos);
            this.panel.object3D.lookAt(camPos);
          }
        }
      }
    }
  });
  </script>
 
</head>
 
<body>
 
<a-scene
  cursor="rayOrigin: mouse"
  webxr="optionalFeatures: hand-tracking"
  renderer="colorManagement: true"
  raycaster="objects: .grabbable">
 
  <!-- ENVIRONMENT -->
  <a-sky color="#BBBBBB"></a-sky>
  <a-plane position="0 0 0"   rotation="-90 0 0" width="20" height="20" color="#999999"></a-plane>
  <a-plane position="0 5 -10"                    width="20" height="10" color="#999999"></a-plane>
  <a-plane position="-10 5 0" rotation="0 90 0"  width="20" height="10" color="#555555"></a-plane>
  <a-plane position="10 5 0"  rotation="0 -90 0" width="20" height="10" color="#555555"></a-plane>
  <a-plane position="0 10 0"  rotation="90 0 0"  width="20" height="20" color="#111111"></a-plane>
 
  <!-- DESK -->
  <a-box position="0 0.75 2"      width="2"    height="0.08" depth="1"    color="#5A4A3A"></a-box>
  <a-box position="-0.9 0.35 1.6" width="0.08" height="0.7"  depth="0.08" color="#444444"></a-box>
